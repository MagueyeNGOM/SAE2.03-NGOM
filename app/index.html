<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";
      import { MovieFeatured } from "./component/MovieFeatured/script.js";
      import { MovieStat } from "./component/MovieStat/script.js";

      let moviesArray = await DataMovie.requestMovies();
      let profilActif = null;
      let listeProfils = [];
      let profilesArray = [];

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerDetail = async function (id) {
        let movieData = await DataMovie.requestMovieDetails(id);
        let f = false;
        if (profilActif !== "") {
          f = await DataMovie.isFavorite(profilActif, id);
        }
        V.renderMovieDetail(movieData, f);
      };

      C.changeProfile = async function () {
        let select = document.querySelector("#profile-select");
        profilActif = select.value;
        if (profilActif == "") {
          V.renderNoProfile();
          return;
        }
        let age = 0;
        if (profilActif !== "") {
          age = DataProfile.g(profilesArray, profilActif);
        }
        let moviesArray = await DataMovie.requestMovies(age);
        let featuredArray = await DataMovie.requestFeatured(age);

        let newMovies = {};
        if (profilActif !== "") {
          let f = await DataMovie.requestFavorite(profilActif);
          newMovies["Mes Favoris"] = f;
        }
        for (let i in moviesArray) {
          newMovies[i] = moviesArray[i];
        }
        V.renderMovies(newMovies, featuredArray);
      };

      C.start = async function () {
        profilesArray = await DataProfile.read();
        V.renderNavBar("C.handlerAbout()","C.handlerStats()", profilesArray);
        V.renderNoProfile();
      };

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerHome = function () {
        document.querySelector("#content").innerHTML = "";
        C.changeProfile();
      };

      C.handlerAddFavorite = async function (movieId) {
        if (profilActif == "") {
          V.renderLog("Sélectionnez un profil pour ajouter un favori.");
          return;
        }
        let body = "id_profile=" + profilActif + "&id_movie=" + movieId;
        let reponse = await DataMovie.addFavorite(body);
        V.renderLog(reponse);
      };

      C.handlerRemoveFavorite = async function (movieId) {
        if (profilActif == "") {
          V.renderLog("Sélectionnez un profil pour retirer un favori.");
          return;
        }
        let body = "id_profile=" + profilActif + "&id_movie=" + movieId;
        let reponse = await DataMovie.removeFavorite(body);
        V.renderLog(reponse);
      };

      C.handlerStats = async function () {
        let totProfil = await DataMovie.requestTotProfil();
        let avgFilm = await DataMovie.requestAvgFilm();
        let totFilm = await DataMovie.requestTotFilm();
        let mostAdded = await DataMovie.requestMostAddedFilm();
        let catPop = await DataMovie.requestCatPop();

        let htmlStats = MovieStat.format(totProfil,avgFilm,totFilm,mostAdded,catPop);

        V.renderStats(htmlStats);
      };

      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */

      V.renderStats = function (htmlStats) {
        let content = document.querySelector("#content");
        content.innerHTML = htmlStats;
      };
      V.renderNavBar = function (hAbout, hStats, profilesArray) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format(
          hAbout,
          "C.handlerHome()",
          hStats,
          profilesArray,
        );
      };

      V.renderMovies = function (group) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieCategory.formatAll(group);
      };

      V.renderMovieDetail = function (movieData, f) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movieData, f);
      };

      V.renderLog = function (message) {
        console.log(message);
      };

      V.renderNoProfile = function () {
        let content = document.querySelector("#content");
        content.innerHTML = MovieFeatured.formatNoprof();
      };

      V.renderMovies = function (group, featured) {
        let content = document.querySelector("#content");
        let htmlFeatured = MovieFeatured.format(featured);
        let htmlCategories = MovieCategory.formatAll(group);
        content.innerHTML = htmlFeatured + htmlCategories;
      };

      C.start();
    </script>
  </body>
</html>
<script type="module"></script>
