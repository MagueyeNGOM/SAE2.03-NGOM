<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 APP</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>

  <body>
    <header id="header"></header>

    <section id="content"></section>

    <script type="module">
      import { NavBar } from "./component/NavBar/script.js";
      import { Movie } from "./component/Movie/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { MovieDetail } from "./component/MovieDetail/script.js";
      import { MovieCategory } from "./component/MovieCategory/script.js";

      let moviesArray = await DataMovie.requestMovies();
      let profilActif = null;
      let listeProfils = [];
      let profilesArray = [];

      // Controleur
      // Rappel, écrire window.C plutôt que let C est nécessaire pour tester depuis la console du navigateur
      // Une fois l'application terminée, on pourrait remettre let C.
      window.C = {};

      C.handlerDetail = async function (id) {
        let movieData = await DataMovie.requestMovieDetails(id);
        let f = false;
        if (profilActif !== "") {
          f = await DataMovie.isFavorite(profilActif, id);
        }
        V.renderMovieDetail(movieData, f);
      };

      C.changeProfile = async function () {
        let select = document.querySelector("#profile-select");
        profilActif = select.value;
        let age = 0;
        if (profilActif !== "") {
          age = DataProfile.g(profilesArray, profilActif);
        }
        let moviesArray = await DataMovie.requestMovies(age);
        if(profilActif !== ""){
          let f = await DataMovie.requestFavorite(profilActif);
            moviesArray[ "Mes Favoris"] = f;
        }
        V.renderMovies(moviesArray);
      };

      C.start = async function () {
        profilesArray = await DataProfile.read();
        V.renderNavBar("C.handlerAbout()", profilesArray);
        let moviesArray = await DataMovie.requestMovies(0);
        V.renderMovies(moviesArray);
      };

      C.handlerAbout = function () {
        alert(
          "Ceci est une base de projet pour la SAE2.03 édition 2025. Bonne chance !",
        );
      };

      C.handlerHome = function () {
        document.querySelector("#content").innerHTML = "";
        C.changeProfile();
      };

      C.handlerAddFavorite = async function (movieId) {
        if (profilActif === null || profilActif === "") {
          alert("Sélectionnez un profil pour ajouter un favori.");
          return;
        }
        let fdata = new FormData();
        fdata.append('id_profile', profilActif);
        fdata.append('id_movie', movieId);
        let reponse = await DataMovie.addFavorite(fdata);
        V.renderLog(reponse);
      };

      C.handlerRemoveFavorite = async function (movieId) {
        if (profilActif === null || profilActif === "") {
          alert("Sélectionnez un profil pour retirer un favori.");
          return;
        }
        let fdata = new FormData();
        fdata.append('id_profile', profilActif);
        fdata.append('id_movie', movieId);
        let reponse = await DataMovie.removeFavorite(fdata);
        V.renderLog(reponse);
      };


      // Vue (contient tout ce qui est relatif à l'affichage)
      window.V = {};

      /**
       * V.renderNavBar
       *
       * Cette fonction est responsable de l'affichage de la barre de navigation (NavBar).
       * Elle sélectionne l'élément HTML avec l'ID "header" et y insère le contenu
       * formaté par le composant NavBar.
       */
      V.renderNavBar = function (hAbout, profilesArray) {
        let header = document.querySelector("#header");
        header.innerHTML = NavBar.format( hAbout, "C.handlerHome()", profilesArray);
      };

      V.renderMovies = function (group) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieCategory.formatAll(group);

      };

      V.renderMovieDetail = function (movieData, f) {
        let content = document.querySelector("#content");
        content.innerHTML = MovieDetail.format(movieData, f);
      };

      V.renderLog = function (message) {
        alert(message);
      };

      C.start();
    </script>
  </body>
</html>
<script type="module"></script>
