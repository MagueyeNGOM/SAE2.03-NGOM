<div class="addMenu">
  <h4 class="addMenu__title"># Ajouter ou modifier un film</h4>
  <form class="addMenu__form">
      <select name="jour">
        <option value="1">Action</option>
        <option value="2">Comédie</option>
        <option value="3">Drame</option>
        <option value="4">Science-fiction</option>
        <option value="5">Animation</option>
        <option value="6">Thriller</option>
        <option value="7">Horreur</option>
        <option value="8">Aventure</option>
        <option value="9">Fantaisie</option>
        <option value="10">Documentaire</option>
      </select>
    </select>

    <input
      required
      type="text"
      name="film"
      placeholder="Saisir le titre du film"
    />

    <input
      required
      type="text"
      name="annee"
      placeholder="Saisir l'année de sortie"
    />

    <input required type="text" name="duree" placeholder="Saisir la durée" />

    <input
      required
      type="text"
      name="nomfichier"
      placeholder="Saisir le nom du fichier"
    />

    <input
      required
      type="text"
      name="url"
      placeholder="Saisir l'url du fichier"
    />

    <input required type="text" name="age" placeholder="Saisir l'age minimum" />

    <input onclick="{{handler}}" type="button" value="Update" name="todo" />
  </form>
</div>
