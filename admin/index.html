<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <section id="log"></section>
    <section id="content"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { MovieForm } from "./component/MovieForm/script.js";
      import { DataMovie } from "./data/dataMovie.js";
      import { DataProfile } from "./data/dataProfile.js";
      import { ProfileForm } from "./component/ProfileForm/script.js";

      window.C = {};

      C.handlerAddMovie = async function () {
        let form = document.querySelector(".addMovie__form");
        if (form.reportValidity()) {
          let fdata = new FormData(form);
          let reponse = await DataMovie.addmovies(fdata);
          V.renderLog(reponse);
        }
      };

      C.handlerAddProfile = async function () {
        let form = document.querySelector(".addProfil__form");
        if (form.reportValidity()) {
          let fdata = new FormData(form);
          let reponse = await DataProfile.addProfile(fdata);
          V.renderLog(reponse);
        }
      };

      C.start = async function () {
        V.renderLog("Chargement des films en cours...");
        let categories = await DataMovie.requestCategory();
        V.renderMovieForm("C.handlerAddMovie()", categories);
        let ages = await DataProfile.requestAge();
        V.renderProfileForm("C.handlerAddProfile()", ages);
      };

      window.V = {};

      V.renderLog = function (message) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(message);
      };

      V.renderMovieForm = function (handler, categories) {
        let content = document.querySelector("#content");
        content.innerHTML += MovieForm.format(handler, categories);
      };

      V.renderProfileForm = function (handler, agesArray) {
        let content = document.querySelector("#content");
        content.innerHTML += ProfileForm.format(handler, agesArray);
      };

      C.start();
    </script>
  </body>
</html>
