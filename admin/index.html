<!doctype html>
<html lang="fr">
  <head>
    <title>SAE2.03 ADMIN</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./css/base.css" />
  </head>
  <body>
    <section id="log"></section>
    <section id="content"></section>

    <script type="module">
      import { Log } from "./component/Log/script.js";
      import { MovieForm } from "./component/MovieForm/script.js";
      import { DataMovie } from "./data/dataMovie.js";

      window.C = {};

      C.handlerAddMovie = async function () {
        let form = document.querySelector('.addMovie__form');
        if (form.reportValidity()) {
        let fdata = new FormData(form);
        let reponse = await DataMovie.addmovies(fdata);
        V.renderLog(reponse);
        }

      };

      C.start = function () {
        V.renderLog("Chargement des films en cours...");
        V.renderMovieForm("C.handlerAddMovie()");
      };


      window.V = {};

      V.renderLog = function (message) {
        let content = document.querySelector("#log");
        content.innerHTML = Log.format(message);
      };

      V.renderMovieForm = function (handler) {
        let content = document.querySelector("#content");
        content.innerHTML += MovieForm.format(handler);
      };

      C.start();
    </script>
  </body>
</html>
